# PostgreSQL database connection
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
server.port=8083

# JWT
jwt.secret=your-256-bit-secret-key-change-this-in-production
jwt.access-token-expiration-ms=300000
jwt.refresh-token-expiration-ms=86400000

server.error.include-message=always

# MyBatis：XML mapper 位置 + 自動把 snake_case 欄位對應到 camelCase 屬性（取代原本的 RowMapper）
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# CORS (comma-separated list of allowed origins)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Cookie：跨網域前後端分離需 Secure=true（要求 HTTPS）。本機純 http 開發時於 .env 設 COOKIE_SECURE=false，未設時預設 true。
cookie.secure=${COOKIE_SECURE:true}