# PostgreSQL database connection
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:test
spring.datasource.username=sa
spring.datasource.password=sa
server.port=8083

# JWT
jwt.secret=your-256-bit-secret-key-change-this-in-production
jwt.access-token-expiration-ms=300000
jwt.refresh-token-expiration-ms=86400000

server.error.include-message=always

# MyBatis：XML mapper 位置 + 自動把 snake_case 欄位對應到 camelCase 屬性（取代原本的 RowMapper）
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

spring.sql.init.mode=always

cors.allowed-origins=http://localhost:1207

# 測試（MockMvc、無 HTTPS）不需要 Secure cookie
cookie.secure=false